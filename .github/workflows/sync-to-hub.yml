name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        uses: huggingface/hub-sync@v1.0
        with:
          github_repo_id: Shreekumar-Shah-AICTE/project-trinetra
          huggingface_repo_id: Shreekumar-Shah/project-trinetra
          hf_token: ${{ secrets.HF_TOKEN }}
